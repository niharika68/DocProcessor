<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 900" width="620" height="900" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <marker id="arrp" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L0,10 L10,5 z" fill="#a855f7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="620" height="900" fill="#f8f9fa" rx="14"/>

  <!-- Title -->
  <text x="310" y="36" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Document Processor Pipeline</text>

  <!-- ── STEP 1: Tab Selection ── -->
  <rect x="60" y="55" width="500" height="60" rx="10" fill="#334155"/>
  <text x="310" y="80" text-anchor="middle" font-size="11" font-weight="bold" fill="white">User Selects Document Type</text>
  <rect x="75"  y="90" width="130" height="18" rx="4" fill="#f59e0b"/>
  <text x="140" y="103" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Invoices</text>
  <rect x="245" y="90" width="130" height="18" rx="4" fill="#3b82f6"/>
  <text x="310" y="103" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Contracts</text>
  <rect x="415" y="90" width="130" height="18" rx="4" fill="#10b981"/>
  <text x="480" y="103" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Referrals</text>

  <!-- Arrow 1→2 -->
  <line x1="310" y1="115" x2="310" y2="138" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="318" y="130" font-size="9" fill="#64748b">Upload PDF</text>

  <!-- ── STEP 2: Render Pages ── -->
  <rect x="160" y="140" width="300" height="52" rx="10" fill="#ca8a04"/>
  <text x="310" y="162" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Render Pages</text>
  <text x="310" y="178" text-anchor="middle" font-size="9" fill="#fef9c3">PyMuPDF · 2x scale · PNG per page</text>

  <!-- Arrow 2→3 (split: images go to AI, PNG goes to Textract) -->
  <line x1="310" y1="192" x2="310" y2="218" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── STEP 3: Textract ── -->
  <rect x="120" y="220" width="380" height="64" rx="10" fill="#16a34a"/>
  <text x="310" y="244" text-anchor="middle" font-size="11" font-weight="bold" fill="white">AWS Textract — AnalyzeDocument</text>
  <text x="310" y="259" text-anchor="middle" font-size="9" fill="#dcfce7">TABLES + FORMS feature types</text>
  <text x="310" y="272" text-anchor="middle" font-size="9" fill="#dcfce7">Extracts: WORD blocks · KEY_VALUE pairs · TABLE cells</text>

  <!-- Arrow 3→4 -->
  <line x1="310" y1="284" x2="310" y2="308" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="318" y="300" font-size="9" fill="#64748b">structured blocks</text>

  <!-- ── STEP 4: AI ── -->
  <rect x="80" y="310" width="460" height="90" rx="10" fill="#7c3aed"/>
  <!-- Star badge -->
  <rect x="88" y="318" width="36" height="18" rx="4" fill="#f59e0b"/>
  <text x="106" y="331" text-anchor="middle" font-size="9" font-weight="bold" fill="white">★ AI</text>
  <text x="310" y="337" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Amazon Nova Pro (AWS Bedrock)</text>
  <text x="310" y="352" text-anchor="middle" font-size="9" fill="#ede9fe">Receives: page images (multimodal) + Textract structured text</text>
  <text x="310" y="365" text-anchor="middle" font-size="9" fill="#ede9fe">Prompt selected by doc_type — semantic interpretation only</text>
  <text x="310" y="378" text-anchor="middle" font-size="9" fill="#c4b5fd">Returns: key_fields · items · flags  +  source_words (no coordinates)</text>
  <text x="310" y="391" text-anchor="middle" font-size="8" fill="#a78bfa">Invoice: anomalies · Contract: risks · Referral: missing fields</text>

  <!-- multimodal arrow from render to AI (side) -->
  <path d="M160 166 Q60 166 60 355 Q60 400 78 355" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrp)"/>
  <text x="20" y="300" font-size="8" fill="#a855f7" transform="rotate(-90,20,300)">page images</text>

  <!-- Arrow 4→5 -->
  <line x1="310" y1="400" x2="310" y2="424" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="318" y="416" font-size="9" fill="#64748b">source_words</text>

  <!-- ── STEP 5: Coordinate Mapping ── -->
  <rect x="120" y="426" width="380" height="64" rx="10" fill="#b91c1c"/>
  <text x="310" y="450" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Coordinate Mapping</text>
  <text x="310" y="465" text-anchor="middle" font-size="9" fill="#fee2e2">Match source_words to Textract WORD blocks</text>
  <text x="310" y="478" text-anchor="middle" font-size="9" fill="#fee2e2">Compute union bbox · sanity check (discard oversized)</text>

  <!-- Arrow 5→6 -->
  <line x1="310" y1="490" x2="310" y2="514" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="318" y="506" font-size="9" fill="#64748b">bbox_norm + bbox_px</text>

  <!-- ── STEP 6: API Response ── -->
  <rect x="120" y="516" width="380" height="64" rx="10" fill="#0369a1"/>
  <text x="310" y="540" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Build API Response</text>
  <text x="310" y="555" text-anchor="middle" font-size="9" fill="#e0f2fe">pages (image_b64 + annotations) · summary (key_fields, items, flags)</text>
  <text x="310" y="568" text-anchor="middle" font-size="9" fill="#e0f2fe">session stored in memory for download</text>

  <!-- Arrow 6→7 -->
  <line x1="310" y1="580" x2="310" y2="604" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── STEP 7: Page Viewer ── -->
  <rect x="120" y="606" width="380" height="64" rx="10" fill="#0284c7"/>
  <text x="310" y="630" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Page Viewer + Overlays</text>
  <text x="310" y="645" text-anchor="middle" font-size="9" fill="#e0f2fe">PDF pages rendered as images · colored divs positioned by bbox_norm</text>
  <rect x="135" y="656" width="80" height="10" rx="3" fill="rgba(255,230,0,0.7)"/>
  <text x="175" y="664" text-anchor="middle" font-size="7" fill="#333">Key Fields</text>
  <rect x="245" y="656" width="80" height="10" rx="3" fill="rgba(255,140,0,0.7)"/>
  <text x="285" y="664" text-anchor="middle" font-size="7" fill="#333">Items</text>
  <rect x="355" y="656" width="80" height="10" rx="3" fill="rgba(220,50,50,0.7)"/>
  <text x="395" y="664" text-anchor="middle" font-size="7" fill="white">Flags</text>

  <!-- Arrow 7→8 -->
  <line x1="310" y1="670" x2="310" y2="694" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── STEP 8: Summary Panel ── -->
  <rect x="120" y="696" width="380" height="52" rx="10" fill="#0284c7"/>
  <text x="310" y="718" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Summary Panel</text>
  <text x="310" y="733" text-anchor="middle" font-size="9" fill="#e0f2fe">Tables for key fields · items · flags · click row to highlight overlay</text>

  <!-- Arrow 8→9 -->
  <line x1="310" y1="748" x2="310" y2="772" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── STEP 9: Downloads ── -->
  <rect x="120" y="774" width="380" height="52" rx="10" fill="#075985"/>
  <text x="310" y="796" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Downloads</text>
  <text x="310" y="811" text-anchor="middle" font-size="9" fill="#e0f2fe">Annotated PDF (PyMuPDF highlights)  ·  JSON export (key fields + items + flags)</text>

  <!-- ── LEGEND ── -->
  <rect x="60" y="842" width="500" height="46" rx="8" fill="#f1f5f9"/>
  <rect x="72" y="854" width="10" height="10" fill="#7c3aed" rx="2"/>
  <text x="88" y="863" font-size="9" fill="#1e293b">★ Amazon Nova Pro — semantic analysis</text>
  <rect x="72" y="870" width="10" height="10" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="3,2" rx="2"/>
  <text x="88" y="879" font-size="9" fill="#1e293b">Dashed purple = multimodal path (page images sent directly to Nova Pro)</text>
  <text x="360" y="863" font-size="9" fill="#475569">All 3 tabs share identical pipeline.</text>
  <text x="360" y="879" font-size="9" fill="#475569">Only the prompt changes per doc_type.</text>
</svg>
